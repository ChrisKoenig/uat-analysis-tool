[tool.pytest.ini_options]
testpaths = [
    "tests",
    "apps/triage/tests",
]
pythonpath = [".", "apps"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "security: security compliance tests",
    "integration: integration / end-to-end tests",
]
